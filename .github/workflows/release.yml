name: Release
on:
  push:
    tags:
      - 'v*' # Workflow sẽ chỉ chạy khi bạn push một tag bắt đầu bằng chữ 'v' (ví dụ: v1.0.0)

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-15-intel]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install

      - name: Pre-download sherpa-onnx libs
        run: |
          mkdir -p /tmp/sherpa-onnx-cache
          curl -L --retry 5 --retry-delay 10 \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.34/sherpa-onnx-v1.12.34-osx-x64-static-lib.tar.bz2" \
            -o /tmp/sherpa-onnx-cache/sherpa-onnx-v1.12.34-osx-x64-static-lib.tar.bz2

      - name: Setup Sidecar Binaries
        run: |
          # Đảm bảo thư mục tồn tại
          mkdir -p src-tauri/binaries
          
          # Chuyển đến thư mục chứa binaries
          cd src-tauri/binaries
          
          # Cấp quyền thực thi (executable) cho các file đã có sẵn
          chmod +x ffmpeg-x86_64-apple-darwin || true
          chmod +x ffprobe-x86_64-apple-darwin || true
          chmod +x yt-dlp-x86_64-apple-darwin || true

      - name: Build for Mac Intel (x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHERPA_ONNX_ARCHIVE_DIR: /tmp/sherpa-onnx-cache
        with:
          # Đã sửa: Sử dụng chính xác tên tag vừa push (vd: v1.0.1) thay vì phụ thuộc tauri.conf.json
          tagName: ${{ github.ref_name }} 
          releaseName: "AutoSub ${{ github.ref_name }}"
          releaseBody: "Bản phát hành AutoSub cho Mac Intel. Vui lòng đọc kỹ hướng dẫn cài đặt trong README.md để vượt Gatekeeper."
          # Đặt false nếu bạn muốn nó publish luôn thành public release, để true nó sẽ nằm ở mục Draft
          releaseDraft: true 
          prerelease: false
          args: --target x86_64-apple-darwin