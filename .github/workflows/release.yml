name: Release
on:
  push:
    branches:
      - main # hoặc master

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-15-intel]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install
      
      - name: Setup Sidecar Binaries
        run: |
          # Đảm bảo thư mục tồn tại
          mkdir -p src-tauri/binaries
          
          # Chuyển đến thư mục chứa binaries
          cd src-tauri/binaries
          
          # Cấp quyền thực thi (executable) cho các file đã có sẵn
          chmod +x ffmpeg-x86_64-apple-darwin || true
          chmod +x ffprobe-x86_64-apple-darwin || true
          chmod +x yt-dlp-x86_64-apple-darwin || true

      - name: Build for Mac Intel (x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action will replace this with the version from tauri.conf.json
          releaseName: "AutoSub v__VERSION__"
          releaseBody: "Bản phát hành AutoSub cho Mac Intel. Vui lòng đọc kỹ hướng dẫn cài đặt trong README.md để vượt Gatekeeper."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin
